<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobOS - Cloud Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-bg: #f0f2f5;
            --sidebar-bg: #1a202c;
            --card-bg: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
            --accent: #3182ce;
            --success: #38a169;
            --warning: #d69e2e;
            --danger: #e53e3e;
        }

        body {
            font-family: 'Rubik', sans-serif;
            margin: 0;
            background-color: var(--primary-bg);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* === Sidebar === */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            color: white;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }

        .logo { font-size: 1.4rem; font-weight: 700; margin-bottom: 40px; }
        
        .nav-item { 
            padding: 12px 15px; margin-bottom: 8px; border-radius: 8px; cursor: pointer; 
            display: flex; gap: 12px; color: #cbd5e0; transition: 0.2s;
        }
        .nav-item:hover { background-color: rgba(255,255,255,0.1); color: white; }
        .nav-item.active { background-color: rgba(255,255,255,0.15); color: white; border-right: 4px solid var(--accent); }

        .sidebar-footer { margin-top: auto; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
        
        .btn-backup {
            width: 100%; background-color: transparent; border: 1px solid #4a5568; color: #cbd5e0;
            padding: 10px; margin-bottom: 10px; border-radius: 6px; cursor: pointer;
            text-align: right; transition: 0.2s; display: flex; align-items: center; gap: 10px;
        }
        .btn-backup:hover { background-color: #2d3748; color: white; border-color: #cbd5e0; }

        /* === Main Content === */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .btn-primary {
            background-color: var(--accent); color: white; border: none; padding: 10px 24px;
            border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s;
            box-shadow: 0 4px 6px rgba(49, 130, 206, 0.3);
        }
        .btn-primary:hover { transform: translateY(-2px); }

        /* === Views === */
        .view-section { display: none; animation: fadeIn 0.3s ease-in-out; }
        .view-section.active-view { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* === Components === */
        .kpi-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-top: 4px solid transparent; }
        .card h3 { margin: 0 0 10px 0; font-size: 0.9rem; color: var(--text-muted); }
        .card .value { font-size: 2rem; font-weight: 700; }

        .charts-wrapper { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 30px; height: 300px;}
        .chart-box { background: var(--card-bg); padding: 15px; border-radius: 12px; position: relative; }

        .table-wrapper { background: var(--card-bg); padding: 20px; border-radius: 12px; }
        
        .filters-container { display: flex; gap: 15px; margin-bottom: 20px; }
        .search-box, .status-filter { 
            padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 1rem; box-sizing: border-box; 
        }
        .search-box { flex: 1; }
        .status-filter { width: 200px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: right; padding: 15px; color: var(--text-muted); border-bottom: 2px solid #edf2f7; }
        td { padding: 15px; border-bottom: 1px solid #edf2f7; }
        
        .badge { padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; display: inline-block;}
        .bg-sent { background-color: #ebf8ff; color: var(--accent); }
        .bg-interview { background-color: #f0fff4; color: var(--success); }
        .bg-rejected { background-color: #fff5f5; color: var(--danger); }
        .bg-pending { background-color: #fffff0; color: var(--warning); }
        
        .btn-icon { background: none; border: none; cursor: pointer; font-size: 1.2rem; margin-left: 5px; opacity: 0.7; transition: 0.2s;}
        .btn-icon:hover { opacity: 1; transform: scale(1.1); }

        /* === MODAL === */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; padding: 30px; border-radius: 12px; width: 700px; max-width: 95vw;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); display: flex; flex-direction: column; max-height: 90vh; overflow-y: auto;
        }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 5px; }
        .form-group.full-width { grid-column: span 2; }
        
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; color: var(--text-main); font-size: 0.9rem;}
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; font-family: 'Rubik', sans-serif;
        }
        
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px; border-top: 1px solid #edf2f7; padding-top: 15px;}
        .btn-cancel { background: #e2e8f0; color: var(--text-main); padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 500;}

        /* View Modal Styles */
        .view-details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .detail-item { background: #f7fafc; padding: 12px; border-radius: 8px; border: 1px solid #edf2f7; }
        .detail-label { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 5px; }
        .detail-value { font-weight: 500; color: var(--text-main); word-break: break-word;}
        .detail-item.full-width { grid-column: span 2; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">🚀 JobOS Cloud</div>
        
        <div class="nav-item active" id="nav-dashboard" onclick="switchView('dashboard')">📊 דאשבורד</div>
        <div class="nav-item" id="nav-jobs" onclick="switchView('jobs')">💼 המשרות שלי</div>

        <div class="sidebar-footer">
            <p style="font-size: 0.8rem; color: #718096; text-align: center;">מסונכרן לענן ☁️</p>
            <button class="btn-backup" onclick="exportData()">💾 הורד גיבוי JSON</button>
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div>
                <h1>ניהול משרות בזמן אמת</h1>
                <p id="syncStatus" style="color: var(--success);">● מחובר לענן</p>
            </div>
            <button class="btn-primary" onclick="openAddModal()">+ הוסף משרה חדשה</button>
        </div>

        <div id="view-dashboard" class="view-section active-view">
            <div class="kpi-container">
                <div class="card" style="border-top-color: var(--accent);"><h3>סה"כ הוגשו</h3><div class="value" id="totalJobs">0</div></div>
                <div class="card" style="border-top-color: var(--success);"><h3>ראיונות</h3><div class="value" id="totalInterviews">0</div></div>
                <div class="card" style="border-top-color: var(--warning);"><h3>בתהליך</h3><div class="value" id="totalPending">0</div></div>
                <div class="card" style="border-top-color: var(--danger);"><h3>סורב</h3><div class="value" id="totalRejected">0</div></div>
            </div>

            <div class="charts-wrapper">
                <div class="chart-box"><canvas id="activityChart"></canvas></div>
                <div class="chart-box"><canvas id="statusChart"></canvas></div>
            </div>
        </div>

        <div id="view-jobs" class="view-section">
            <div class="table-wrapper">
                <div class="filters-container">
                    <input type="text" id="searchJobs" class="search-box" placeholder="חפש חברה או תפקיד..." onkeyup="filterTable()">
                    <select id="filterStatus" class="status-filter" onchange="filterTable()">
                        <option value="all">כל הסטטוסים</option>
                        <option value="sent">נשלח</option>
                        <option value="pending">ממתין</option>
                        <option value="interview">ראיונות</option>
                        <option value="rejected">סורב</option>
                    </select>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>חברה</th>
                            <th>תפקיד</th>
                            <th>סטטוס</th>
                            <th>הגשה</th>
                            <th>טיפול המשך</th>
                            <th>פעולות</th>
                        </tr>
                    </thead>
                    <tbody id="jobsTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="jobModal">
        <div class="modal-content">
            <h2 id="modalTitle">הוספת משרה</h2>
            <form id="jobForm" onsubmit="saveJob(event)">
                <input type="hidden" id="inputId">
                <div class="form-grid">
                    <div class="form-group"><label>חברה *</label><input type="text" id="inputCompany" required></div>
                    <div class="form-group"><label>תפקיד *</label><input type="text" id="inputRole" required></div>
                    <div class="form-group"><label>לינק</label><input type="url" id="inputLink"></div>
                    <div class="form-group"><label>סטטוס</label>
                        <select id="inputStatus">
                            <option value="sent">נשלח</option>
                            <option value="pending">ממתין</option>
                            <option value="interview">ראיון</option>
                            <option value="rejected">סורב</option>
                        </select>
                    </div>
                    <div class="form-group"><label>תאריך הגשה</label><input type="date" id="inputDate" required></div>
                    <div class="form-group"><label>פולו-אפ</label><input type="date" id="inputFollowUp"></div>
                    <div class="form-group full-width"><label>הערות</label><textarea id="inputNotes" rows="3"></textarea></div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeModal('jobModal')">ביטול</button>
                    <button type="submit" class="btn-primary">שמור</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="viewJobModal">
        <div class="modal-content">
            <h2 id="viewTitle">פרטי משרה</h2>
            <div class="view-details-grid" id="viewDetailsContent"></div>
            <div class="modal-actions">
                <button type="button" class="btn-cancel" onclick="closeModal('viewJobModal')">סגור</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase Configuration - Corrected URL and syntax
        const firebaseConfig = {
          apiKey: "AIzaSyBpcWFE8nLPo2FqOMQJmhLpKsTpdeYxtBM",
          authDomain: "myjob-a98c8.firebaseapp.com",
          databaseURL: "https://myjob-a98c8-default-rtdb.europe-west1.firebasedatabase.app/", 
          projectId: "myjob-a98c8",
          storageBucket: "myjob-a98c8.firebasestorage.app",
          messagingSenderId: "252793031293",
          appId: "1:252793031293:web:49565d2a12c74291a67f14",
          measurementId: "G-Z8662VY9SS"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const jobsRef = ref(db, 'jobs');

        let jobs = [];
        let chartStatusInstance = null;
        let chartActivityInstance = null;

        // Initialize and listen for cloud updates
        function init() {
            onValue(jobsRef, (snapshot) => {
                const data = snapshot.val();
                jobs = data || [];
                renderDashboard();
                document.getElementById('syncStatus').innerText = "● מסונכרן לענן";
                document.getElementById('syncStatus').style.color = "var(--success)";
            }, (error) => {
                console.error(error);
                document.getElementById('syncStatus').innerText = "● שגיאת סנכרון";
                document.getElementById('syncStatus').style.color = "var(--danger)";
            });
        }

        function saveAndSync() {
            set(jobsRef, jobs);
        }

        // Global functions attached to window for HTML access
        window.switchView = (viewName) => {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active-view'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('view-' + viewName).classList.add('active-view');
            document.getElementById('nav-' + viewName).classList.add('active');
        };

        window.openAddModal = () => {
            document.getElementById('jobForm').reset();
            document.getElementById('inputId').value = '';
            document.getElementById('inputDate').valueAsDate = new Date();
            document.getElementById('jobModal').style.display = 'flex';
        };

        window.closeModal = (id) => document.getElementById(id).style.display = 'none';

        window.saveJob = (event) => {
            event.preventDefault();
            const id = document.getElementById('inputId').value;
            const jobData = {
                id: id ? parseInt(id) : Date.now(),
                company: document.getElementById('inputCompany').value,
                role: document.getElementById('inputRole').value,
                status: document.getElementById('inputStatus').value,
                date: document.getElementById('inputDate').value,
                link: document.getElementById('inputLink').value,
                followUp: document.getElementById('inputFollowUp').value,
                notes: document.getElementById('inputNotes').value
            };

            if (id) {
                const index = jobs.findIndex(j => j.id === parseInt(id));
                jobs[index] = jobData;
            } else {
                jobs.unshift(jobData);
            }

            saveAndSync();
            closeModal('jobModal');
        };

        window.deleteJob = (id) => {
            if(confirm('למחוק לצמיתות?')) {
                jobs = jobs.filter(j => j.id !== id);
                saveAndSync();
            }
        };

        window.openEditModal = (id) => {
            const job = jobs.find(j => j.id === id);
            document.getElementById('inputId').value = job.id;
            document.getElementById('inputCompany').value = job.company;
            document.getElementById('inputRole').value = job.role;
            document.getElementById('inputStatus').value = job.status;
            document.getElementById('inputDate').value = job.date;
            document.getElementById('inputLink').value = job.link || '';
            document.getElementById('inputFollowUp').value = job.followUp || '';
            document.getElementById('inputNotes').value = job.notes || '';
            document.getElementById('jobModal').style.display = 'flex';
        };

        window.openViewModal = (id) => {
            const job = jobs.find(j => j.id === id);
            const content = `
                <div class="detail-item"><div class="detail-label">חברה</div><div>${job.company}</div></div>
                <div class="detail-item"><div class="detail-label">תפקיד</div><div>${job.role}</div></div>
                <div class="detail-item"><div class="detail-label">סטטוס</div><div class="badge bg-${job.status}">${translateStatus(job.status)}</div></div>
                <div class="detail-item"><div class="detail-label">תאריך</div><div>${job.date}</div></div>
                <div class="detail-item full-width"><div class="detail-label">הערות</div><div style="white-space:pre-wrap">${job.notes || '-'}</div></div>
            `;
            document.getElementById('viewDetailsContent').innerHTML = content;
            document.getElementById('viewJobModal').style.display = 'flex';
        };

        window.exportData = () => {
            const blob = new Blob([JSON.stringify(jobs, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'jobOS_backup.json';
            a.click();
        };

        window.filterTable = () => {
            const q = document.getElementById('searchJobs').value.toLowerCase();
            const s = document.getElementById('filterStatus').value;
            document.querySelectorAll('#jobsTableBody tr').forEach(row => {
                const matchText = row.innerText.toLowerCase().includes(q);
                const matchStatus = s === 'all' || row.dataset.status === s;
                row.style.display = (matchText && matchStatus) ? '' : 'none';
            });
        };

        function renderDashboard() {
            renderTable();
            document.getElementById('totalJobs').innerText = jobs.length;
            document.getElementById('totalInterviews').innerText = jobs.filter(j => j.status === 'interview').length;
            document.getElementById('totalPending').innerText = jobs.filter(j => j.status === 'pending' || j.status === 'sent').length;
            document.getElementById('totalRejected').innerText = jobs.filter(j => j.status === 'rejected').length;
            updateCharts();
        }

        function renderTable() {
            const tbody = document.getElementById('jobsTableBody');
            tbody.innerHTML = jobs.map(job => `
                <tr data-status="${job.status}">
                    <td><strong>${job.company}</strong></td>
                    <td>${job.role}</td>
                    <td><span class="badge bg-${job.status}">${translateStatus(job.status)}</span></td>
                    <td>${job.date}</td>
                    <td>${job.followUp || '-'}</td>
                    <td>
                        <button class="btn-icon" onclick="openViewModal(${job.id})">👁️</button>
                        <button class="btn-icon" onclick="openEditModal(${job.id})">✏️</button>
                        <button class="btn-icon" onclick="deleteJob(${job.id})">🗑️</button>
                    </td>
                </tr>
            `).join('');
        }

        function updateCharts() {
            const ctxS = document.getElementById('statusChart').getContext('2d');
            if(chartStatusInstance) chartStatusInstance.destroy();
            const sCounts = {sent:0, pending:0, interview:0, rejected:0};
            jobs.forEach(j => { if(sCounts[j.status] !== undefined) sCounts[j.status]++; });
            chartStatusInstance = new Chart(ctxS, {
                type: 'doughnut',
                data: {
                    labels: ['נשלח', 'ממתין', 'ראיון', 'סורב'],
                    datasets: [{ data: Object.values(sCounts), backgroundColor: ['#3182ce', '#d69e2e', '#38a169', '#e53e3e'] }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
            });

            const ctxA = document.getElementById('activityChart').getContext('2d');
            if(chartActivityInstance) chartActivityInstance.destroy();
            const dates = {};
            jobs.forEach(j => { const d = j.date.substring(5); dates[d] = (dates[d] || 0) + 1; });
            chartActivityInstance = new Chart(ctxA, {
                type: 'bar',
                data: {
                    labels: Object.keys(dates).sort(),
                    datasets: [{ label: 'הגשות', data: Object.keys(dates).sort().map(d => dates[d]), backgroundColor: '#2d3748', borderRadius: 4 }]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
            });
        }

        function translateStatus(s) {
            const d = {sent:'נשלח', pending:'ממתין', interview:'ראיון', rejected:'סורב'};
            return d[s] || s;
        }

        init();
    </script>
</body>
</html>
