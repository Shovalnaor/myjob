<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobOS - Professional Cloud Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-bg: #f0f2f5;
            --sidebar-bg: #1a202c;
            --card-bg: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
            --accent: #3182ce;
            --success: #38a169;
            --warning: #d69e2e;
            --danger: #e53e3e;
        }

        body {
            font-family: 'Rubik', sans-serif;
            margin: 0;
            background-color: var(--primary-bg);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
            /* מוסתר כברירת מחדל עד להתחברות */
            display: none; 
        }

        /* === Sidebar === */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            color: white;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            flex-shrink: 0;
        }

        .logo { font-size: 1.4rem; font-weight: 700; margin-bottom: 40px; }
        
        .nav-item { 
            padding: 12px 15px; margin-bottom: 8px; border-radius: 8px; cursor: pointer; 
            display: flex; gap: 12px; color: #cbd5e0; transition: 0.2s;
        }
        .nav-item:hover { background-color: rgba(255,255,255,0.1); color: white; }
        .nav-item.active { background-color: rgba(255,255,255,0.2); color: white; border-right: 4px solid var(--accent); }

        .sidebar-footer { margin-top: auto; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
        
        .btn-sidebar {
            width: 100%; background-color: transparent; border: 1px solid #4a5568; color: #cbd5e0;
            padding: 10px; margin-bottom: 10px; border-radius: 6px; cursor: pointer;
            text-align: right; font-size: 0.85rem; display: flex; align-items: center; gap: 10px;
        }
        .btn-sidebar:hover { background-color: #2d3748; color: white; }

        /* === Main Content === */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .btn-primary {
            background-color: var(--accent); color: white; border: none; padding: 12px 24px;
            border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s;
            box-shadow: 0 4px 6px rgba(49, 130, 206, 0.3);
        }

        /* === Views === */
        .view-section { display: none; animation: fadeIn 0.3s ease-in-out; }
        .view-section.active-view { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* === Components === */
        .kpi-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-top: 4px solid var(--accent); }
        .card h3 { margin: 0 0 10px 0; font-size: 0.9rem; color: var(--text-muted); }
        .card .value { font-size: 2rem; font-weight: 700; }

        .charts-wrapper { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 30px; height: 300px;}
        .chart-box { background: var(--card-bg); padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        .table-wrapper { background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); overflow-x: auto; }
        
        .filters-container { display: flex; gap: 15px; margin-bottom: 20px; }
        .search-box, .status-filter { padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
        .search-box { flex: 1; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; min-width: 700px; }
        th { text-align: right; padding: 15px; color: var(--text-muted); border-bottom: 2px solid #edf2f7; font-size: 0.9rem; }
        td { padding: 15px; border-bottom: 1px solid #edf2f7; }
        
        .badge { padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; display: inline-block;}
        .bg-sent { background-color: #ebf8ff; color: var(--accent); }
        .bg-pending { background-color: #fffff0; color: var(--warning); }
        .bg-interview { background-color: #f0fff4; color: var(--success); }
        .bg-rejected { background-color: #fff5f5; color: var(--danger); }
        
        .btn-icon { background: none; border: none; cursor: pointer; font-size: 1.2rem; margin-left: 8px; transition: 0.2s; opacity: 0.7; }
        .btn-icon:hover { opacity: 1; transform: scale(1.1); }

        /* === MODALS === */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; padding: 30px; border-radius: 16px; width: 850px; max-width: 95vw;
            max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 25px rgba(0,0,0,0.2);
        }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group.full-width { grid-column: span 2; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-family: inherit;
        }

        /* View Modal Details Styling */
        .view-details-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .detail-item { background: #f8fafc; padding: 15px; border-radius: 10px; border: 1px solid #f1f5f9; }
        .detail-label { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; margin-bottom: 5px; }
        .detail-value { font-weight: 600; color: var(--text-main); font-size: 1rem; }
        .detail-item.full-width { grid-column: span 2; }
        .req-container { background: #fff; padding: 15px; border: 1px solid #e2e8f0; border-radius: 8px; max-height: 300px; overflow-y: auto; white-space: pre-wrap; font-size: 0.9rem; line-height: 1.6; }

        /* === MOBILE RESPONSIVE === */
        @media (max-width: 768px) {
            body { flex-direction: column; height: auto; overflow-y: auto; display: none; }
            .sidebar { width: 100%; height: auto; padding: 15px; }
            .logo { margin-bottom: 15px; text-align: center; }
            .nav-item { justify-content: center; }
            .main-content { padding: 15px; }
            .top-bar { flex-direction: column; text-align: center; gap: 15px; }
            .kpi-container { grid-template-columns: 1fr 1fr; gap: 10px; }
            .charts-wrapper { grid-template-columns: 1fr; height: auto; }
            .chart-box { height: 250px; }
            .view-details-grid { grid-template-columns: 1fr; }
            .form-grid { grid-template-columns: 1fr; }
            .form-group.full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">🚀 JobOS Cloud</div>
        <div class="nav-item active" id="nav-dashboard" onclick="switchView('dashboard')">📊 דאשבורד</div>
        <div class="nav-item" id="nav-jobs" onclick="switchView('jobs')">💼 המשרות שלי</div>
        
        <div class="sidebar-footer">
            <button class="btn-sidebar" onclick="exportData()">💾 גיבוי JSON</button>
            <button class="btn-sidebar" style="border-color: var(--danger); color: var(--danger);" onclick="logout()">🔒 התנתק מהמערכת</button>
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div>
                <h1>ניהול קריירה חכם</h1>
                <p id="syncStatus" style="color: var(--success); font-weight: 600;">● מאובטח ומסונכרן</p>
            </div>
            <button class="btn-primary" onclick="openAddModal()">+ הוסף משרה חדשה</button>
        </div>

        <div id="view-dashboard" class="view-section active-view">
            <div class="kpi-container">
                <div class="card"><h3>סה"כ הגשות</h3><div class="value" id="totalJobs">0</div></div>
                <div class="card" style="border-top-color: var(--success);"><h3>ראיונות</h3><div class="value" id="totalInterviews">0</div></div>
                <div class="card" style="border-top-color: var(--warning);"><h3>בתהליך</h3><div class="value" id="totalPending">0</div></div>
                <div class="card" style="border-top-color: var(--danger);"><h3>סורב</h3><div class="value" id="totalRejected">0</div></div>
            </div>

            <div class="charts-wrapper">
                <div class="chart-box"><canvas id="activityChart"></canvas></div>
                <div class="chart-box"><canvas id="statusChart"></canvas></div>
            </div>
        </div>

        <div id="view-jobs" class="view-section">
            <div class="table-wrapper">
                <div class="filters-container">
                    <input type="text" id="searchJobs" class="search-box" placeholder="חפש חברה, תפקיד או הערות..." onkeyup="filterTable()">
                    <select id="filterStatus" class="status-filter" onchange="filterTable()">
                        <option value="all">כל הסטטוסים</option>
                        <option value="sent">נשלח</option>
                        <option value="pending">ממתין</option>
                        <option value="interview">ראיון</option>
                        <option value="rejected">סורב</option>
                    </select>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>חברה</th>
                            <th>תפקיד</th>
                            <th>סטטוס</th>
                            <th>תאריך</th>
                            <th>פעולות</th>
                        </tr>
                    </thead>
                    <tbody id="jobsTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="jobModal">
        <div class="modal-content">
            <h2 id="modalTitle">פרטי המשרה</h2>
            <form id="jobForm" onsubmit="saveJob(event)">
                <input type="hidden" id="inputId">
                <div class="form-grid">
                    <div class="form-group"><label>חברה *</label><input type="text" id="inputCompany" required></div>
                    <div class="form-group"><label>תפקיד *</label><input type="text" id="inputRole" required></div>
                    <div class="form-group"><label>לינק למשרה (URL)</label><input type="url" id="inputLink" placeholder="https://..."></div>
                    <div class="form-group"><label>איש קשר / מגייס</label><input type="text" id="inputContact"></div>
                    <div class="form-group">
                        <label>סטטוס</label>
                        <select id="inputStatus">
                            <option value="sent">נשלח</option>
                            <option value="pending">ממתין</option>
                            <option value="interview">ראיון</option>
                            <option value="rejected">סורב</option>
                        </select>
                    </div>
                    <div class="form-group"><label>תאריך הגשה</label><input type="date" id="inputDate" required></div>
                    <div class="form-group"><label>שכר מצופה</label><input type="number" id="inputExpected"></div>
                    <div class="form-group"><label>שכר שהוצע</label><input type="number" id="inputOffered"></div>
                    <div class="form-group"><label>תאריך פולו-אפ</label><input type="date" id="inputFollowUp"></div>
                    <div class="form-group full-width"><label>הערות אישיות / Next Steps</label><textarea id="inputNotes" rows="2"></textarea></div>
                    <div class="form-group full-width"><label>תיאור ודרישות תפקיד מלאות</label><textarea id="inputRequirements" rows="6"></textarea></div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeModal('jobModal')">ביטול</button>
                    <button type="submit" class="btn-primary">שמור משרה</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="viewJobModal">
        <div class="modal-content">
            <h2 id="viewTitle" style="border-bottom: 2px solid var(--accent); padding-bottom: 10px;">פרטי משרה</h2>
            <div class="view-details-grid" id="viewDetailsContent"></div>
            <div class="modal-actions">
                <button type="button" class="btn-cancel" style="width: 100%;" onclick="closeModal('viewJobModal')">סגור</button>
            </div>
        </div>
    </div>

    <script type="module">
        // Firebase Auth & Database Imports
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBpcWFE8nLPo2FqOMQJmhLpKsTpdeYxtBM",
            authDomain: "myjob-a98c8.firebaseapp.com",
            databaseURL: "https://myjob-a98c8-default-rtdb.europe-west1.firebasedatabase.app/", 
            projectId: "myjob-a98c8",
            storageBucket: "myjob-a98c8.firebasestorage.app",
            messagingSenderId: "252793031293",
            appId: "1:252793031293:web:49565d2a12c74291a67f14"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const jobsRef = ref(db, 'jobs');

        let jobs = [];
        let chartStatus = null, chartActivity = null;

        // Auth Protection Logic
        function init() {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    // המשתמש מחובר - הצג את האתר וטען נתונים
                    document.body.style.display = "flex"; 
                    onValue(jobsRef, (snapshot) => {
                        jobs = snapshot.val() || [];
                        renderDashboard();
                    });
                } else {
                    // לא מחובר - הסתר הכל ובקש התחברות
                    document.body.style.display = "none";
                    window.login();
                }
            });
        }

        window.login = async () => {
            const email = prompt("הכנס אימייל מורשה:");
            const password = prompt("הכנס סיסמה:");
            if (email && password) {
                try {
                    await signInWithEmailAndPassword(auth, email, password);
                } catch (error) {
                    alert("פרטי גישה שגויים!");
                    window.location.reload();
                }
            }
        };

        window.logout = () => {
            if(confirm("להתנתק מהמערכת?")) signOut(auth);
        };

        // --- Core Functions ---
        window.switchView = (view) => {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active-view'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('view-' + view).classList.add('active-view');
            document.getElementById('nav-' + view).classList.add('active');
        };

        window.openAddModal = () => {
            document.getElementById('jobForm').reset();
            document.getElementById('inputId').value = '';
            document.getElementById('inputDate').valueAsDate = new Date();
            document.getElementById('jobModal').style.display = 'flex';
        };

        window.closeModal = (id) => document.getElementById(id).style.display = 'none';

        window.saveJob = (e) => {
            e.preventDefault();
            const id = document.getElementById('inputId').value;
            const data = {
                id: id ? parseInt(id) : Date.now(),
                company: document.getElementById('inputCompany').value,
                role: document.getElementById('inputRole').value,
                link: document.getElementById('inputLink').value,
                contact: document.getElementById('inputContact').value,
                status: document.getElementById('inputStatus').value,
                date: document.getElementById('inputDate').value,
                followUp: document.getElementById('inputFollowUp').value,
                expectedSalary: document.getElementById('inputExpected').value,
                offeredSalary: document.getElementById('inputOffered').value,
                notes: document.getElementById('inputNotes').value,
                requirements: document.getElementById('inputRequirements').value
            };

            if (id) {
                const idx = jobs.findIndex(j => j.id === parseInt(id));
                jobs[idx] = data;
            } else {
                jobs.unshift(data);
            }
            set(jobsRef, jobs);
            closeModal('jobModal');
        };

        window.openEditModal = (id) => {
            const j = jobs.find(x => x.id === id);
            document.getElementById('inputId').value = j.id;
            document.getElementById('inputCompany').value = j.company || '';
            document.getElementById('inputRole').value = j.role || '';
            document.getElementById('inputLink').value = j.link || '';
            document.getElementById('inputContact').value = j.contact || '';
            document.getElementById('inputStatus').value = j.status;
            document.getElementById('inputDate').value = j.date;
            document.getElementById('inputFollowUp').value = j.followUp || '';
            document.getElementById('inputExpected').value = j.expectedSalary || '';
            document.getElementById('inputOffered').value = j.offeredSalary || '';
            document.getElementById('inputNotes').value = j.notes || '';
            document.getElementById('inputRequirements').value = j.requirements || '';
            document.getElementById('jobModal').style.display = 'flex';
        };

        window.openViewModal = (id) => {
            const j = jobs.find(x => x.id === id);
            const content = `
                <div class="detail-item"><div class="detail-label">חברה</div><div class="detail-value">${j.company}</div></div>
                <div class="detail-item"><div class="detail-label">תפקיד</div><div class="detail-value">${j.role}</div></div>
                <div class="detail-item"><div class="detail-label">סטטוס</div><div class="detail-value"><span class="badge bg-${j.status}">${translate(j.status)}</span></div></div>
                <div class="detail-item"><div class="detail-label">תאריך הגשה</div><div class="detail-value">${j.date}</div></div>
                <div class="detail-item"><div class="detail-label">איש קשר / מקור</div><div class="detail-value">${j.contact || '-'}</div></div>
                <div class="detail-item"><div class="detail-label">לינק</div><div class="detail-value">${j.link ? `<a href="${j.link}" target="_blank" style="color:var(--accent)">🔗 פתח משרה</a>` : '-'}</div></div>
                <div class="detail-item"><div class="detail-label">פולו-אפ</div><div class="detail-value">${j.followUp || '-'}</div></div>
                <div class="detail-item"><div class="detail-label">שכר (מצופה / מוצע)</div><div class="detail-value">${j.expectedSalary || '-'} / ${j.offeredSalary || '-'}</div></div>
                <div class="detail-item full-width"><div class="detail-label">הערות וצעדים הבאים</div><div class="detail-value" style="white-space:pre-wrap">${j.notes || '-'}</div></div>
                <div class="detail-item full-width"><div class="detail-label">דרישות התפקיד המלאות</div><div class="req-container">${j.requirements || 'אין מידע לתצוגה.'}</div></div>
            `;
            document.getElementById('viewDetailsContent').innerHTML = content;
            document.getElementById('viewJobModal').style.display = 'flex';
        };

        window.deleteJob = (id) => {
            if(confirm('למחוק לצמיתות מהענן?')) {
                jobs = jobs.filter(x => x.id !== id);
                set(jobsRef, jobs);
            }
        };

        window.filterTable = () => {
            const q = document.getElementById('searchJobs').value.toLowerCase();
            const s = document.getElementById('filterStatus').value;
            document.querySelectorAll('#jobsTableBody tr').forEach(row => {
                const text = row.innerText.toLowerCase().includes(q);
                const stat = s === 'all' || row.dataset.status === s;
                row.style.display = (text && stat) ? '' : 'none';
            });
        };

        // --- Dashboard & Charts ---
        function renderDashboard() {
            renderTable();
            const counts = { sent: 0, pending: 0, interview: 0, rejected: 0 };
            jobs.forEach(j => { if(counts[j.status] !== undefined) counts[j.status]++; });
            
            document.getElementById('totalJobs').innerText = jobs.length;
            document.getElementById('totalInterviews').innerText = counts.interview;
            document.getElementById('totalPending').innerText = counts.pending + counts.sent;
            document.getElementById('totalRejected').innerText = counts.rejected;
            updateCharts(counts);
        }

        function renderTable() {
            document.getElementById('jobsTableBody').innerHTML = jobs.map(j => `
                <tr data-status="${j.status}">
                    <td><strong>${j.company}</strong></td>
                    <td>${j.role}</td>
                    <td><span class="badge bg-${j.status}">${translate(j.status)}</span></td>
                    <td>${j.date}</td>
                    <td>
                        <button class="btn-icon" onclick="openViewModal(${j.id})">👁️</button>
                        <button class="btn-icon" onclick="openEditModal(${j.id})">✏️</button>
                        <button class="btn-icon" onclick="deleteJob(${j.id})">🗑️</button>
                    </td>
                </tr>
            `).join('');
        }

        function updateCharts(s) {
            const ctxS = document.getElementById('statusChart').getContext('2d');
            if(chartStatus) chartStatus.destroy();
            chartStatus = new Chart(ctxS, {
                type: 'doughnut',
                data: {
                    labels: ['נשלח', 'ממתין', 'ראיון', 'סורב'],
                    datasets: [{ data: [s.sent, s.pending, s.interview, s.rejected], backgroundColor: ['#3182ce', '#d69e2e', '#38a169', '#e53e3e'] }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
            });

            const ctxA = document.getElementById('activityChart').getContext('2d');
            if(chartActivity) chartActivity.destroy();
            const dates = {};
            jobs.forEach(j => { const d = j.date.substring(5); dates[d] = (dates[d] || 0) + 1; });
            const sortedDates = Object.keys(dates).sort();
            chartActivity = new Chart(ctxA, {
                type: 'bar',
                data: {
                    labels: sortedDates,
                    datasets: [{ label: 'הגשות', data: sortedDates.map(d => dates[d]), backgroundColor: '#2d3748', borderRadius: 5 }]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
            });
        }

        window.exportData = () => {
            const blob = new Blob([JSON.stringify(jobs, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'jobOS_Backup.json';
            a.click();
        };

        function translate(s) { const d = {sent:'נשלח', pending:'ממתין', interview:'ראיון', rejected:'סורב'}; return d[s] || s; }

        init();
    </script>
</body>
</html>
